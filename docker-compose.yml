version: "3"

services:
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - api
    environment:
      REDIS_URL: redis://redis:6379/0?decode_responses=True
      API_URL: http://api:80  # Internal Docker network URL
    # === TRAEFIK LABELS (to be filled by you) ===
    labels:
      - "traefik.enable=true"
      # Example placeholders - replace with your actual config:
      # - "traefik.http.routers.classquiz.rule=Host(`your-domain.com`)"
      # - "traefik.http.routers.classquiz.entrypoints=websecure"
      # - "traefik.http.routers.classquiz.tls.certresolver=yourresolver"
      # - "traefik.http.services.classquiz.loadbalancer.server.port=80"
      # - "traefik.http.middlewares.classquiz-redirect.redirectscheme.scheme=https"
      # - "traefik.http.routers.classquiz.middlewares=classquiz-redirect"
    networks:
      - default
      - traefik-public  # ← Add your Traefik network name here
    expose:
      - "80"  # Expose to Traefik, but don't publish to host

  api:
    build: &build_cfg
      context: .
      dockerfile: Dockerfile
    restart: &restart always
    depends_on: &depends
      - db
      - redis
    environment: &env_vars
      # --- DON'T CHANGE FROM HERE ---
      DB_URL: "postgresql://postgres:classquiz@db:5432/classquiz"
      REDIS: "redis://redis:6379/0?decode_responses=True"
      SECRET_KEY: "TOP_SECRET"
      MAX_WORKERS: "1"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      MEILISEARCH_URL: "http://meilisearch:7700"
      # -- DON'T CHANGE TILL HERE ---

      # --- GENERAL CONFIG ---
      ROOT_ADDRESS: "https://your-domain.com"  # ← UPDATE THIS

      # --- MAIL CONFIG ---
      MAIL_PORT: "587"
      MAIL_ADDRESS: "email@email@email.email"
      MAIL_PASSWORD: "PASSWORT"
      MAIL_USERNAME: "email@email@email.email"
      MAIL_SERVER: "smtp.email.email"
      SKIP_EMAIL_VERIFICATION: "True"

      # --- EXTERNAL API CONFIG ---
      # HCAPTCHA_KEY: ""
      # PIXABAY_API_KEY: ""
      # RECAPTCHA_KEY: ""

      # -- STORAGE CONFIG ---
      STORAGE_BACKEND: "local"
      STORAGE_PATH: "/app/data"
      #S3_ACCESS_KEY: "YOUR_ACCESS_KEY"
      #S3_SECRET_KEY: "YOUR_SECRET_KEY"
      #S3_BASE_URL: "YOUR_S3_BASE_URL"

      # --- AUTH PROVIDERS (optional) ---
      #GOOGLE_CLIENT_ID: ""
      #GOOGLE_CLIENT_SECRET: ""
      #GITHUB_CLIENT_ID: ""
      #GITHUB_CLIENT_SECRET: ""
      #CUSTOM_OPENID_PROVIDER__CLIENT_ID: ""
      #CUSTOM_OPENID_PROVIDER__CLIENT_SECRET: ""
      #CUSTOM_OPENID_PROVIDER__SERVER_METADATA_URL: "/.well-known/openid-configuration"

    volumes:
      - ./uploads:/app/data
    # === OPTIONAL: Direct API routing via Traefik ===
    # If you want Traefik to route /api/* directly to this service:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.classquiz-api.rule=Host(`your-domain.com`) && PathPrefix(`/api`)"
    #   - "traefik.http.services.classquiz-api.loadbalancer.server.port=80"
    networks:
      - default
      - traefik-public  # ← Only if routing API directly via Traefik
    expose:
      - "80"

  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli","ping" ]
    # No Traefik labels - internal only

  db:
    image: postgres:14-alpine
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: "classquiz"
      POSTGRES_DB: "classquiz"
    volumes:
      - data:/var/lib/postgresql/data
    # No Traefik labels - internal only

  meilisearch:
    image: getmeili/meilisearch:v0.28.0
    restart: always
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch-data:/data.ms
    # No Traefik labels - internal only
    # ⚠️ If you ever expose this, add HTTP basic auth middleware!

  worker:
    build: *build_cfg
    environment: *env_vars
    depends_on: *depends
    restart: *restart
    command: arq classquiz.worker.WorkerSettings
    # No network exposure needed - background worker only

# Removed the Caddy 'proxy' service since Traefik handles routing

volumes:
  data:
  meilisearch-data:

networks:
  default:
  traefik-public:  # ← Define your Traefik network; set external: true if managed elsewhere
    external: true  # ← Set to true if Traefik network is created externally